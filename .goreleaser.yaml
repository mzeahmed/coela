# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

# Always named "coela", regardless of the repository's own name.
project_name: coela

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: coela
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    # Injects version metadata into main's package-level vars, consumed
    # later by a `coela version` command. Also forces cmd.devOutputDir back
    # to "": that var redirects `coela new`'s output into a gitignored
    # directory for developers running the CLI from source, but a released
    # binary must always generate in the current working directory.
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}} -X github.com/mzeahmed/coela/cmd.devOutputDir=

archives:
  - formats: [tar.gz]
    # Matches the OS/Arch naming `uname` would report.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

# Version string used for local builds (`--snapshot`), which have no git tag.
snapshot:
  version_template: "{{ .Version }}-SNAPSHOT-{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^ci:"
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
  prerelease: auto