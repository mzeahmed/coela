services:
    traefik:
        image: traefik:v3.4
        container_name: peskio_traefik
        command:
            - --configFile=/etc/traefik/traefik.yml
        ports:
            - "80:80"
            - "443:443"
            - "8080:8080"
        volumes:
            - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
            - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
            - ./certs:/certs
        networks:
            - frontend

    php:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: peskio_php
        volumes:
            - ./:/var/www/html
        networks:
            - application
            - database

    nginx:
        image: nginx:alpine
        container_name: peskio_nginx
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php
        labels:
            - traefik.enable=true
            - traefik.http.routers.peskio.rule=Host(`peskio.local`)
            - traefik.http.routers.peskio.entrypoints=web,websecure
            - traefik.http.routers.peskio.tls=true
            - traefik.http.services.peskio.loadbalancer.server.port=80
        networks:
            - frontend
            - application

    database:
        image: mariadb:11.8
        container_name: peskio_database
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_USER: ${DB_USER}
            MYSQL_PASSWORD: ${DB_PASSWORD}
        volumes:
            - database_data:/var/lib/mysql
        networks:
            - database

    # phpMyAdmin only supports MySQL-compatible engines (MariaDB/MySQL).
    phpmyadmin:
        image: phpmyadmin:5.2
        container_name: peskio_phpmyadmin
        depends_on:
            - database
        environment:
            PMA_HOST: database
            PMA_PORT: 3306
            PMA_ABSOLUTE_URI: https://db.peskio.local/
        labels:
            - traefik.enable=true
            - traefik.http.routers.phpmyadmin.rule=Host(`db.peskio.local`)
            - traefik.http.routers.phpmyadmin.entrypoints=websecure
            - traefik.http.routers.phpmyadmin.tls=true
            - traefik.http.services.phpmyadmin.loadbalancer.server.port=80
        networks:
            - frontend
            - database

    mailpit:
        image: axllent/mailpit
        container_name: peskio_mailpit
        labels:
            - traefik.enable=true
            - traefik.http.routers.mailpit.rule=Host(`mail.peskio.local`)
            - traefik.http.services.mailpit.loadbalancer.server.port=8025
        networks:
            - frontend

    redis:
        image: redis:7-alpine
        container_name: peskio_redis
        networks:
            - application

volumes:
    database_data:

networks:
    frontend:
    application:
    database: